<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Nueva Contraseña - Compuedu</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .full-height { min-height: 100vh; }
        .bg-image {
            background-image: url('https://images.unsplash.com/photo-1497294815431-9365093b7331?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center; position: relative;
        }
        .bg-image::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.4); }
        .bg-image-text { position: relative; z-index: 1; }
        .form-container { display: flex; align-items: center; justify-content: center; background-color: #ffffff; }
        .logo-img { max-width: 140px; height: auto; display: block; margin: 0 auto; }
        .input-group-text { background-color: #f8f9fa; border-right: none; color: #6c757d; }
        .form-control { border-left: none; padding: 0.75rem; }
        .btn-dark-custom { background-color: #343a40; border: none; color: white; transition: all 0.3s ease; border-radius: 50px; }
        .btn-dark-custom:hover { background-color: #212529; transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row full-height">
            <div class="col-md-6 form-container py-5">
                <div class="col-lg-8 col-xl-7 mx-auto px-4 text-center">
                    <img th:src="@{/img/logo.png}" alt="Logo" class="logo-img mb-3">
                    <h3 class="fw-bold">Crea tu nueva clave</h3>
                    <p class="text-muted small">Ingresa una contraseña segura para acceder a Compuedu</p>

                    <form th:action="@{/auth/actualizar-password}" method="post" class="text-start mt-4">
                        <input type="hidden" name="token" th:value="${token}">

                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">NUEVA CONTRASEÑA</label>
                            <div class="input-group shadow-sm rounded-3 overflow-hidden">
                                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">CONFIRMAR CONTRASEÑA</label>
                            <div class="input-group shadow-sm rounded-3 overflow-hidden">
                                <span class="input-group-text"><i class="fas fa-check-double"></i></span>
                                <input type="password" class="form-control" placeholder="••••••••" required>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-dark-custom w-100 py-2 fw-bold">
                            <i class="fas fa-save me-2"></i> Actualizar Contraseña
                        </button>
                    </form>
                </div>
            </div>
            <div class="col-md-6 p-0 bg-image d-none d-md-flex flex-column justify-content-center align-items-center text-white text-center">
                <div class="bg-image-text p-5">
                    <h1 class="display-5 fw-bold mb-3">Tu seguridad es prioridad</h1>
                    <p class="lead fs-5">Asegúrate de usar una combinación de letras, números y símbolos.</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
