<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Editar Perfil - Compuedu</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Fuentes y Frameworks -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            --card-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.05);
            --input-focus-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f4f7fa;
            color: #1e293b;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        /* Contenedor Efecto Blur de Fondo */
        .page-wrapper {
            position: relative;
            width: 100%;
            z-index: 1;
        }

        /* Tarjeta Estilo Premium */
        .card {
            border: none;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            overflow: hidden;
        }

        /* Encabezado Estilizado */
        .profile-header {
            background: radial-gradient(circle at top right, rgba(59, 130, 246, 0.08) 0%, rgba(30, 58, 138, 0.02) 100%), white;
            padding: 2.5rem 2rem 1.5rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .icon-wrapper {
            background: #eff6ff;
            color: #2563eb;
            width: 72px;
            height: 72px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            box-shadow: 0 8px 16px -4px rgba(59, 130, 246, 0.15);
        }

        /* Campos de Formulario Rediseñados */
        .form-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #64748b;
            margin-bottom: 0.5rem;
        }

        .input-group {
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #cbd5e1;
            transition: all 0.3s ease;
            background: white;
        }

        .input-group:focus-within {
            border-color: #3b82f6;
            box-shadow: var(--input-focus-shadow);
        }

        .input-group-text {
            border: none;
            padding-left: 1.1rem;
            padding-right: 0.9rem;
            font-size: 1rem;
            transition: color 0.3s ease;
        }

        .input-group:focus-within .input-group-text {
            color: #2563eb !important;
        }

        .form-control {
            border: none;
            padding: 0.75rem 1rem 0.75rem 0.25rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1e293b;
            background: transparent;
        }

        .form-control:focus {
            box-shadow: none;
            background: transparent;
        }

        /* Variación para campo Readonly */
        .input-group.field-readonly {
            background-color: #f8fafc;
            border-color: #e2e8f0;
        }

        .form-control[readonly] {
            color: #64748b;
            cursor: not-allowed;
        }

        .form-text {
            font-size: 0.75rem;
            color: #94a3b8;
            margin-top: 0.4rem;
            padding-left: 0.25rem;
        }

        /* Botonera de Control */
        .btn-submit {
            background: var(--primary-gradient);
            border: none;
            border-radius: 14px;
            font-weight: 700;
            font-size: 0.95rem;
            padding: 0.8rem 1.5rem;
            transition: all 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px -4px rgba(29, 78, 216, 0.35);
        }

        .btn-cancel {
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 0.6rem 1.5rem;
            color: #64748b;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            color: #1e293b;
            background-color: #f1f5f9;
        }
    </style>
</head>

<body>

    <div class="page-wrapper py-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">

                    <div class="card">
                        <!-- Cabecera del Perfil -->
                        <div class="profile-header text-center">
                            <div class="icon-wrapper mb-3">
                                <i class="fas fa-user-edit"></i>
                            </div>
                            <h4 class="fw-800 text-dark mb-1" style="font-weight: 800; letter-spacing: -0.5px;">Editar
                                Mis Datos</h4>
                            <p class="text-muted small mb-0">Mantén tu información de contacto actualizada en el portal
                            </p>
                        </div>

                        <!-- Cuerpo del Formulario -->
                        <div class="card-body p-4 p-sm-5">
                            <form th:action="@{/perfil/actualizar}" th:object="${usuario}" method="post">

                                <!-- Campo: Usuario (Readonly) -->
                                <div class="mb-3.5" style="margin-bottom: 1.5rem;">
                                    <label class="form-label">USUARIO</label>
                                    <div class="input-group field-readonly">
                                        <span class="input-group-text text-muted bg-transparent"><i
                                                class="fas fa-user"></i></span>
                                        <input type="text" th:field="*{userName}" class="form-control" readonly>
                                    </div>
                                    <div class="form-text">
                                        <i class="fas fa-info-circle me-1"></i> El identificador de usuario no puede ser
                                        modificado.
                                    </div>
                                </div>

                                <!-- Campo: Correo Electrónico -->
                                <div class="mb-3.5" style="margin-bottom: 1.5rem;">
                                    <label class="form-label">CORREO ELECTRÓNICO</label>
                                    <div class="input-group">
                                        <span class="input-group-text text-muted bg-transparent"><i
                                                class="fas fa-envelope"></i></span>
                                        <input type="email" th:field="*{email}" class="form-control"
                                            placeholder="nombre@ejemplo.com" required>
                                    </div>
                                </div>

                                <!-- Campo: Teléfono -->
                                <div class="mb-4">
                                    <label class="form-label">TELÉFONO DE CONTACTO</label>
                                    <div class="input-group">
                                        <span class="input-group-text text-muted bg-transparent"><i
                                                class="fas fa-phone"></i></span>
                                        <input type="tel" th:field="*{telefono}" class="form-control"
                                            placeholder="Ej: 3001234567">
                                    </div>
                                </div>

                                <!-- Bloque de Botones de Acción -->
                                <div class="d-flex flex-column gap-2 mt-4">
                                    <button type="submit" class="btn btn-primary btn-submit text-white shadow-sm">
                                        <i class="fas fa-save me-2"></i> Guardar Cambios
                                    </button>
                                    <a th:href="@{/dashboard}" class="btn btn-cancel">
                                        Cancelar y Volver
                                    </a>
                                </div>

                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
