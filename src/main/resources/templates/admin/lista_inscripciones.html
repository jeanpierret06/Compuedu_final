<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gestión de Inscripciones</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f4f6f9; }
        .navbar { background: white; border-bottom: 1px solid #eef2f6; }
        .navbar-brand { font-weight: 600; color: #2c3e50 !important; }
        
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        
        .table thead th {
            background-color: #f8f9fc;
            color: #4e73df;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            border-bottom: 2px solid #e3e6f0;
            padding: 1rem;
        }
        .table td { vertical-align: middle; color: #5a5c69; padding: 1rem; }
        
        /* Badges */
        .badge-convocatoria { background-color: #e3f2fd; color: #0d47a1; padding: 0.4em 0.8em; border-radius: 6px; font-weight: 500; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 35px; height: 35px; background: #eaecf4; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #4e73df; }

        /* Botones Acción */
        .btn-icon { width: 32px; height: 32px; padding: 0; display: inline-flex; align-items: center; justify-content: center; border-radius: 6px; transition: all 0.2s; border: 1px solid #e3e6f0; background: white; color: #555; }
        .btn-icon:hover { transform: translateY(-2px); border-color: transparent; color: white; }
        .btn-pdf:hover { background-color: #e74a3b; }
        .btn-delete:hover { background-color: #343a40; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top mb-4 py-3 shadow-sm">
    <div class="container">
        <a class="navbar-brand" href="#">
            <i class="fas fa-shield-alt text-primary me-2"></i>Admin<span class="text-primary">Panel</span>
        </a>
        <div class="d-flex">
            <a th:href="@{/dashboard}" class="btn btn-outline-secondary btn-sm rounded-pill px-3 me-2">
                <i class="fas fa-arrow-left me-1"></i> Volver
            </a>
            <form th:action="@{/logout}" method="post">
                <button class="btn btn-danger btn-sm rounded-pill px-3"><i class="fas fa-power-off"></i></button>
            </form>
        </div>
    </div>
</nav>

<div class="container pb-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h2 class="fw-bold text-dark mb-1">Registro de Inscripciones</h2>
            <p class="text-muted mb-0">Historial de estudiantes inscritos en convocatorias.</p>
        </div>
        <span class="badge bg-primary rounded-pill px-3 py-2 fs-6 shadow-sm">
            Total: <span th:text="${inscripciones.size()}">0</span>
        </span>
    </div>

    <div class="card shadow-sm">
        
        <div th:if="${inscripciones.empty}" class="text-center py-5">
            <i class="fas fa-clipboard-list fa-3x text-muted mb-3 opacity-25"></i>
            <p class="text-muted fw-medium">No hay inscripciones registradas aún.</p>
        </div>

        <div class="table-responsive" th:if="${!inscripciones.empty}">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th class="ps-4">Folio</th>
                        <th>Estudiante</th>
                        <th>Convocatoria</th>
                        <th>Fecha Inscripción</th>
                        <th class="text-center pe-4">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ins : ${inscripciones}">
                        <td class="ps-4 text-muted fw-bold" th:text="'#' + ${ins.id}">#1</td>
                        
                        <td>
                            <div class="user-info">
                                <div class="user-avatar"><i class="fas fa-user"></i></div>
                                <div>
                                    <div class="fw-bold text-dark" th:text="${ins.usuario.userName}">Usuario</div>
                                    <small class="text-muted" th:text="${ins.usuario.email}">email@ejemplo.com</small>
                                </div>
                            </div>
                        </td>

                        <td>
                            <span class="badge-convocatoria">
                                <i class="fas fa-tag me-1"></i>
                                <span th:text="${ins.convocatoria.titulo}">Nombre Beca</span>
                            </span>
                        </td>

                        <td>
                            <span class="text-secondary">
                                <i class="far fa-calendar-alt me-1"></i>
                                <span th:text="${#temporals.format(ins.fechaInscripcion, 'dd/MM/yyyy HH:mm')}">Fecha</span>
                            </span>
                        </td>

                        <td class="text-center pe-4">
                            <div class="d-flex justify-content-center gap-2">
                                <a th:href="@{/convocatorias/comprobante/{id}(id=${ins.id})}" 
                                   class="btn-icon btn-pdf" title="Descargar Comprobante" data-bs-toggle="tooltip">
                                    <i class="fas fa-file-pdf"></i>
                                </a>
                                
                                <a th:href="@{/admin/inscripciones/eliminar/{id}(id=${ins.id})}" 
                                   class="btn-icon btn-delete text-danger" 
                                   title="Cancelar Inscripción" data-bs-toggle="tooltip"
                                   onclick="return confirm('¿Estás seguro de cancelar esta inscripción? El estudiante perderá su cupo.');">
                                    <i class="fas fa-trash-alt"></i>
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    var tooltipTriggerList = [].slice.call(document.querySelectorAll('[data-bs-toggle="tooltip"]'))
    var tooltipList = tooltipTriggerList.map(function (tooltipTriggerEl) { return new bootstrap.Tooltip(tooltipTriggerEl) })
</script>

</body>
</html>
