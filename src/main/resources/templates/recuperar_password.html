<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Restablecer Contraseña</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

    <style>
        .full-height { min-height: 100vh; }
        
        .bg-image {
            background-image: url('https://images.unsplash.com/photo-1497294815431-9365093b7331?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            position: relative;
        }
        .bg-image::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
        }
        .bg-image-text { position: relative; z-index: 1; }

        .form-container {
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
        }

        .logo-img {
            max-width: 140px;
            height: auto;
            display: block;
            margin: 0 auto;
            border-radius: 8px;
        }

        .input-group-text { background-color: #f8f9fa; border-right: none; color: #6c757d; }
        .form-control { border-left: none; padding: 0.75rem; }
        .form-control:focus {
            box-shadow: none;
            border-color: #dee2e6;
            border-left: 1px solid #dee2e6; 
        }

        .btn-gradient {
            background: linear-gradient(45deg, #212529, #495057);
            border: none; color: white; transition: all 0.3s ease;
        }
        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(33, 37, 41, 0.4);
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row full-height">
            <div class="col-md-6 form-container py-5 order-1">
                <div class="col-lg-8 col-xl-7 mx-auto px-4 text-center">
                    <img th:src="@{/img/logo.png}" alt="Logo" class="logo-img mb-3 shadow-sm">
                    <h3 class="fw-bold text-dark">Restablecer acceso</h3>
                    <p class="text-muted small">Enviaremos un enlace a tu correo institucional</p>

                    <div th:if="${mensaje}" class="alert alert-success mt-3 shadow-sm" th:text="${mensaje}"></div>
                    <div th:if="${error}" class="alert alert-danger mt-3 shadow-sm" th:text="${error}"></div>

                    <form th:action="@{/auth/enviar-solicitud}" method="post" class="text-start mt-4">
                        <div class="mb-4">
                            <label class="form-label text-muted small fw-bold">CORREO ELECTRÓNICO</label>
                            <div class="input-group shadow-sm rounded-3 overflow-hidden">
                                <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                <input type="email" name="email" class="form-control border-start-0" placeholder="usuario@sena.edu.co" required>
                            </div>
                        </div>
                        
                        <button type="submit" class="btn btn-gradient w-100 rounded-pill py-2 fw-bold">
                            Enviar instrucciones
                        </button>
                        
                        <div class="text-center mt-4">
                            <a th:href="@{/login}" class="text-decoration-none small text-muted fw-bold">
                                <i class="fas fa-arrow-left me-1"></i> Volver al inicio de sesión
                            </a>
                        </div>
                    </form>
                </div>
            </div>

            <div class="col-md-6 p-0 bg-image d-none d-md-flex flex-column justify-content-center align-items-center text-white text-center order-2">
                <div class="bg-image-text p-5">
                    <h1 class="display-5 fw-bold mb-3">Recupera tu cuenta</h1>
                    <p class="lead fs-5">Sigue los pasos enviados a tu correo para restablecer tu contraseña de forma segura.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
